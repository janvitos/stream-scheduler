<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stream Scheduler — Login</title>
  <style>
    @font-face { font-family: 'Inter'; src: url('/fonts/inter-latin-400-normal.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: block; }
    @font-face { font-family: 'Inter'; src: url('/fonts/inter-latin-500-normal.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: block; }
    @font-face { font-family: 'Inter'; src: url('/fonts/inter-latin-600-normal.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: block; }
    @font-face { font-family: 'Inter'; src: url('/fonts/inter-latin-700-normal.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: block; }
    @font-face { font-family: 'Inter'; src: url('/fonts/inter-latin-800-normal.woff2') format('woff2'); font-weight: 800; font-style: normal; font-display: block; }
    #app-loader { position: fixed; inset: 0; background: #0b0d0f; z-index: 9999; }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0d0f;
      --surface: #111418;
      --border:  #1e2329;
      --accent:  #00e5a0;
      --accent2: #0077ff;
      --text:    #e8eaf0;
      --muted:   #5a6070;
      --danger:  #ff4c6a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove { to { background-position: 40px 40px; } }

    .glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      opacity: .18;
    }
    .glow-1 { background: var(--accent);  top: -150px; right: -100px; }
    .glow-2 { background: var(--accent2); bottom: -150px; left: -100px; }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 400px;
      margin: 0 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(24px) scale(.97); } }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -.5px; }
    .logo-sub  { font-size: 11px; color: var(--muted); font-family: 'Inter', sans-serif; margin-top: 1px; }

    h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 32px; font-family: 'Inter', sans-serif; }

    label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }

    .field { margin-bottom: 20px; }

    input[type=text], input[type=password] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,.12);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: .04em;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s, transform .15s;
    }
    .btn:hover   { opacity: .88; }
    .btn:active  { transform: scale(.98); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .error {
      background: rgba(255,76,106,.1);
      border: 1px solid rgba(255,76,106,.3);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 20px;
      display: none;
      font-family: 'Inter', sans-serif;
    }
    .error.show { display: block; animation: shake .3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
  </style>
</head>
<body>
<div id="app-loader"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="card">
    <div class="logo">
      <img src="/logo.svg" class="logo-icon" alt="StreamSched" style="width:52px;height:52px;border-radius:50%;display:block">
      <div>
        <div class="logo-text">StreamSched</div>
        <div class="logo-sub">// scheduler</div>
      </div>
    </div>
    <h1>Welcome back</h1>
    <p class="subtitle">Enter your credentials to continue</p>
    <div class="error" id="err"></div>
    <iframe name="login-sink" style="display:none" aria-hidden="true"></iframe>
    <form id="login-form" action="/api/auth/login-noop" method="post" target="login-sink" autocomplete="on">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" name="username" autocomplete="username" placeholder="admin" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <button class="btn" id="loginBtn" type="submit">Sign In</button>
    </form>
  </div>

  <script>
    const btn  = document.getElementById('loginBtn');
    const err  = document.getElementById('err');
    const doLogin = async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showErr('Please fill in all fields'); return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const d = await r.json();
        if (d.ok) { window.location = '/'; }
        else { showErr(d.error || 'Invalid credentials'); btn.disabled=false; btn.textContent='Sign In'; }
      } catch { showErr('Server error'); btn.disabled=false; btn.textContent='Sign In'; }
    };
    const showErr = (msg) => { err.textContent = msg; err.className = 'error show'; };
    document.getElementById('login-form').addEventListener('submit', e => { e.preventDefault(); doLogin(); });
    document.fonts.ready.then(() => { document.getElementById('app-loader').remove(); });
  </script>
</body>
</html>
